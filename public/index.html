<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Intelligence Pipeline UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #38bdf8 0%, #4f46e5 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
            word-break: break-all;
            line-height: 1.4;
        }

        .success {
            background-color: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Document Intelligence Pipeline</h1>
    <p>Enter a public PDF URL to trigger the background processing, structure extraction, and verification workflow using Trigger.dev Cloud.</p>
    
    <form id="triggerForm">
        <label for="pdfUrl">Target PDF URL</label>
        <input type="text" id="pdfUrl" name="pdfUrl" placeholder="https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf" required>
        <button type="submit" id="submitBtn">Trigger Pipeline Run</button>
    </form>

    <div id="result"></div>
</div>

<script>
    document.getElementById('triggerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const pdfUrl = document.getElementById('pdfUrl').value;

        submitBtn.disabled = true;
        submitBtn.innerText = 'Triggering task...';
        resultDiv.style.display = 'none';

        try {
            const response = await fetch('/api/trigger', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pdfUrl })
            });

            const data = await response.json();
            
            if (response.ok) {
                resultDiv.className = 'success';
                resultDiv.innerHTML = `<strong>Pipeline Triggered Successfully!</strong><br>
                                       Run ID: <code>${data.runId}</code><br>
                                       <a href="${data.dashboardUrl}" target="_blank" style="color: #38bdf8; text-decoration: underline;">Open Trigger.dev Cloud Logs</a>`;
            } else {
                resultDiv.className = 'error';
                resultDiv.innerText = `Error: ${data.message || 'Failed to trigger pipeline'}`;
            }
        } catch (err) {
            resultDiv.className = 'error';
            resultDiv.innerText = `Connection failed: ${err.message}`;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Trigger Pipeline Run';
            resultDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
